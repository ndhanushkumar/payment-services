spring:
  data:
    mongodb:
      host: localhost
      port: 27017
      database: local

---
spring:
  application:
    name: PAYMENT-SERVICE
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
management:
  tracing:
    sampling:
      probability: 1.0